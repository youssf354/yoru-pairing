<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>𖤍 Yoru · TikTok</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #04010e;
      --pink:    #f472b6;
      --pink2:   #fb7185;
      --teal:    #2dd4bf;
      --violet:  #9d6fff;
      --card-bg: rgba(15, 8, 35, 0.72);
      --border:  rgba(244,114,182,0.18);
      --text:    #ede8ff;
      --muted:   #6b5f8a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: url('https://file.garden/aauvg01sjleV_ic1/9.jpg') center/cover no-repeat;
      filter: brightness(0.12) saturate(1.2);
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse 70% 50% at 10% 15%, rgba(244,114,182,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 85%, rgba(45,212,191,0.07) 0%, transparent 60%);
    }
    .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%;
      opacity: 0; animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh); opacity: 0; }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-20px); opacity: 0; }
    }

    /* ── Layout ── */
    .wrapper {
      position: relative; z-index: 10;
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--pink); text-decoration: none;
      font-size: 0.85rem; margin-bottom: 30px;
      opacity: 0.8; transition: opacity 0.2s;
    }
    .back:hover { opacity: 1; }

    /* ── Header ── */
    .header {
      text-align: center; margin-bottom: 40px;
      animation: fade-down 0.7s ease both;
    }
    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .header-icon {
      font-size: 3rem; display: block; margin-bottom: 10px;
      filter: drop-shadow(0 0 20px rgba(244,114,182,0.6));
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(244,114,182,0.6)); }
      50%       { filter: drop-shadow(0 0 40px rgba(251,113,133,0.9)); }
    }
    .header h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.4rem, 4vw, 2rem);
      background: linear-gradient(135deg, #fda4af, #f472b6, #2dd4bf);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { color: var(--muted); font-size: 0.82rem; margin-top: 8px; letter-spacing: 0.1em; }
    .header-badge {
      display: inline-block;
      background: rgba(244,114,182,0.1);
      border: 1px solid rgba(244,114,182,0.25);
      color: var(--pink);
      font-size: 0.7rem;
      padding: 4px 14px;
      border-radius: 20px;
      margin-top: 10px;
      letter-spacing: 0.1em;
    }

    /* ── Search ── */
    .search-wrap { margin-bottom: 36px; animation: fade-up 0.7s ease 0.1s both; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .search-box {
      display: flex; gap: 12px; flex-wrap: wrap;
      background: var(--card-bg); backdrop-filter: blur(20px);
      border: 1px solid rgba(244,114,182,0.2);
      border-radius: 28px; padding: 10px 10px 10px 20px;
    }
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 0.95rem; font-family: 'Tajawal', sans-serif; min-width: 0;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, #db2777, #f472b6);
      border: none; border-radius: 20px; color: white;
      font-weight: 700; font-size: 0.9rem; cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(244,114,182,0.3);
      white-space: nowrap;
    }
    .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,114,182,0.45); }
    .search-btn:active { transform: scale(0.98); }

    /* ── Tip ── */
    .tip {
      text-align: center; font-size: 0.75rem; color: var(--muted);
      margin-bottom: 28px; animation: fade-up 0.7s ease 0.2s both;
    }
    .tip span { color: var(--pink); opacity: 0.7; }

    /* ── State ── */
    .state {
      text-align: center; padding: 50px 20px;
      color: var(--muted); font-size: 0.9rem;
      animation: fade-up 0.5s ease both;
    }
    .state-icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }
    .state.error { color: var(--pink2); }

    /* ── Results ── */
    .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

    /* ── Single Result (URL mode) ── */
    .single-result {
      background: var(--card-bg); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 24px;
      padding: 28px; text-align: center;
      animation: fade-up 0.6s ease both;
    }
    .single-icon { font-size: 3rem; margin-bottom: 14px; display: block; }
    .single-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .single-author { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }
    .single-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-pill {
      background: rgba(244,114,182,0.08); border: 1px solid rgba(244,114,182,0.15);
      border-radius: 20px; padding: 5px 14px; font-size: 0.75rem; color: var(--pink);
    }
    .dl-btn-big {
      display: block; width: 100%;
      padding: 14px; border: none; border-radius: 16px; cursor: pointer;
      font-size: 0.95rem; font-weight: 700; font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #db2777, #f472b6);
      color: white; transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(244,114,182,0.3);
    }
    .dl-btn-big:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,114,182,0.45); }
    .dl-btn-big:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Video Card ── */
    .video-card {
      background: var(--card-bg); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden; transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      animation: fade-up 0.6s ease both;
    }
    .video-card:hover { transform: translateY(-6px); border-color: rgba(244,114,182,0.45); box-shadow: 0 16px 40px rgba(244,114,182,0.12); }

    /* TikTok-style vertical thumb */
    .thumb-wrap { position: relative; overflow: hidden; aspect-ratio: 9/14; max-height: 240px; }
    .video-thumb { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; background: rgba(244,114,182,0.05); }
    .video-card:hover .video-thumb { transform: scale(1.04); }
    .thumb-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(4,1,14,0.85) 0%, transparent 50%); }
    .thumb-play {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(244,114,182,0.2); border: 1px solid rgba(244,114,182,0.3);
      border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    .video-info { padding: 14px; }
    .video-title {
      font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-meta { font-size: 0.73rem; color: var(--muted); margin-bottom: 12px; }
    .dl-btn {
      display: block; width: 100%; padding: 10px;
      background: rgba(244,114,182,0.1); border: 1px solid rgba(244,114,182,0.2);
      border-radius: 12px; color: var(--pink); font-size: 0.82rem;
      font-weight: 700; font-family: 'Tajawal', sans-serif; cursor: pointer;
      transition: all 0.25s ease; text-align: center;
    }
    .dl-btn:hover { background: rgba(244,114,182,0.25); border-color: var(--pink); box-shadow: 0 0 16px rgba(244,114,182,0.2); transform: translateY(-1px); }
    .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Progress Bar ── */
    .progress-wrap {
      margin-top: 10px; display: none;
      flex-direction: column; gap: 6px;
    }
    .progress-wrap.active { display: flex; }
    .progress-bar-track {
      width: 100%; height: 5px;
      background: rgba(244,114,182,0.1);
      border-radius: 10px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #db2777, #f472b6);
      border-radius: 10px; transition: width 0.3s ease;
    }
    .progress-bar-fill.done { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .progress-info {
      display: flex; justify-content: space-between;
      font-size: 0.7rem;
    }
    .progress-info .prog-size { color: var(--pink); font-weight: 700; }
    .progress-info .prog-pct  { color: var(--muted); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card-bg); backdrop-filter: blur(20px);
      border: 1px solid rgba(244,114,182,0.3); color: var(--text);
      padding: 12px 24px; border-radius: 40px; font-size: 0.85rem;
      z-index: 999; white-space: nowrap;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(244,114,182,0.6); color: var(--pink2); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(244,114,182,0.4); border-radius: 4px; }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="wrapper">

  <a href="/" class="back">← العودة للرئيسية</a>

  <div class="header">
    <span class="header-icon">🎵</span>
    <h1>TikTok Downloader</h1>
    <p>حمّل فيديوهات تيك توك بدون علامة مائية</p>
    <span class="header-badge">✨ بدون علامة مائية</span>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" class="search-input" placeholder="رابط تيك توك أو كلمة بحث..."/>
      <button id="searchBtn" class="search-btn">🔍 بحث / تحميل</button>
    </div>
  </div>

  <p class="tip">💡 الصق رابط فيديو مباشرة للتحميل الفوري · أو ابحث بكلمة مفتاحية <span>لعرض نتائج</span></p>

  <div id="stateBox" class="state" style="display:none"></div>
  <div id="results" class="results"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  // Particles
  const pc = document.getElementById('particles')
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div')
    p.className = 'particle'
    p.style.cssText = `left:${Math.random()*100}%;width:${Math.random()*2.5+1}px;height:${Math.random()*2.5+1}px;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*10}s;background:${Math.random()>.4?'#f472b6':'#2dd4bf'};opacity:0.6;`
    pc.appendChild(p)
  }

  const API_KEY = localStorage.getItem('api_key') || 'test-key-123'
  const toast = document.getElementById('toast')
  let toastTimer

  // ── Download Counter ──
  const STORAGE_KEY = 'yoru_tt_dl_counts'

  function getDlCounts() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') } catch { return {} }
  }

  function getDlCount(key) { return getDlCounts()[key] || 0 }

  function incrementDlCount(key) {
    const counts = getDlCounts()
    counts[key] = (counts[key] || 0) + 1
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(counts)) } catch {}
    return counts[key]
  }

  function makeCounterKey(url) {
    // نستخدم آخر 20 حرف من الـ URL كـ key مختصر
    return String(url || '').slice(-30).replace(/[^a-z0-9]/gi, '')
  }

  function showToast(msg, isErr = false) {
    clearTimeout(toastTimer)
    toast.textContent = msg
    toast.className = 'toast show' + (isErr ? ' error' : '')
    toastTimer = setTimeout(() => toast.className = 'toast', 3000)
  }

  function setState(html, type = '') {
    const b = document.getElementById('stateBox')
    b.innerHTML = html
    b.className = 'state' + (type ? ' ' + type : '')
    b.style.display = html ? 'block' : 'none'
  }

  function escHtml(s) {
    if (!s) return ''
    return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))
  }

  function fmtNum(n) {
    if (!n) return '0'
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K'
    return String(n)
  }

  async function search() {
    const input = document.getElementById('searchInput').value.trim()
    if (!input) return
    setState('<span class="state-icon">⏳</span> جاري المعالجة...')
    document.getElementById('results').innerHTML = ''

    try {
      const res = await fetch(`/api/tiktok/auto?input=${encodeURIComponent(input)}`, { headers: { 'x-api-key': API_KEY } })
      const data = await res.json()
      if (!data.success) throw new Error(data.error || 'فشل')
      setState('')

      if (data.type === 'url') {
        const v = data.video
        const ckey = makeCounterKey(v.videoUrl)
        document.getElementById('results').innerHTML = `
          <div class="single-result" style="grid-column:1/-1">
            <span class="single-icon">🎬</span>
            <div class="single-title">${escHtml(v.title || 'فيديو تيك توك')}</div>
            <div class="single-author">👤 ${escHtml(v.author || 'غير معروف')}</div>
            <div class="single-stats">
              ${v.stats?.likes  ? `<div class="stat-pill">❤️ ${fmtNum(v.stats.likes)}</div>` : ''}
              ${v.stats?.views  ? `<div class="stat-pill">👁 ${fmtNum(v.stats.views)}</div>` : ''}
              ${v.stats?.shares ? `<div class="stat-pill">🔗 ${fmtNum(v.stats.shares)}</div>` : ''}
            </div>
            <button class="dl-btn-big" id="btn-${ckey}" onclick="dlVideo('${escHtml(v.videoUrl)}', this, '${ckey}')">📥 تحميل بدون علامة مائية</button>
            <div class="progress-wrap" id="prog-${ckey}" style="margin-top:14px">
              <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progbar-${ckey}"></div>
              </div>
              <div class="progress-info">
                <span class="prog-size" id="progsize-${ckey}">0 KB</span>
                <span class="prog-pct"  id="progpct-${ckey}">0%</span>
              </div>
            </div>
          </div>`
      } else {
        let html = ''
        ;(data.videos || []).forEach((v, i) => {
          const ckey = makeCounterKey(v.videoUrl)
          html += `
            <div class="video-card" style="animation-delay:${i*0.06}s">
              <div class="thumb-wrap">
                ${v.thumbnail ? `<img class="video-thumb" src="${escHtml(v.thumbnail)}" loading="lazy" alt="">` : '<div class="video-thumb"></div>'}
                <div class="thumb-overlay"></div>
                <div class="thumb-play">▶</div>
              </div>
              <div class="video-info">
                <div class="video-title">${escHtml((v.title || 'فيديو تيك توك').substring(0, 80))}</div>
                <div class="video-meta">
                  👤 ${escHtml(v.author || 'غير معروف')}
                  ${v.stats?.likes ? ` · ❤️ ${fmtNum(v.stats.likes)}` : ''}
                </div>
                <button class="dl-btn" id="btn-${ckey}" onclick="dlVideo('${escHtml(v.videoUrl)}', this, '${ckey}')">📥 تحميل بدون علامة مائية</button>
                <div class="progress-wrap" id="prog-${ckey}">
                  <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progbar-${ckey}"></div>
                  </div>
                  <div class="progress-info">
                    <span class="prog-size" id="progsize-${ckey}">0 KB</span>
                    <span class="prog-pct"  id="progpct-${ckey}">0%</span>
                  </div>
                </div>
              </div>
            </div>`
        })
        document.getElementById('results').innerHTML = html
      }
    } catch (e) {
      setState(`<span class="state-icon">❌</span>${e.message}`, 'error')
    }
  }

  function fmtBytes(b) {
    if (b < 1024) return b + ' B'
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB'
    return (b / 1024 / 1024).toFixed(2) + ' MB'
  }

  async function dlVideo(url, btn, ckey) {
    if (!url || url === 'null' || url === 'undefined') {
      showToast('❌ رابط التحميل غير متوفر', true); return
    }
    const orig = btn.innerHTML
    btn.disabled = true
    btn.innerHTML = '⏳ جاري...'

    const progWrap = document.getElementById(`prog-${ckey}`)
    const progBar  = document.getElementById(`progbar-${ckey}`)
    const progSize = document.getElementById(`progsize-${ckey}`)
    const progPct  = document.getElementById(`progpct-${ckey}`)
    if (progWrap) progWrap.classList.add('active')

    showToast('⏳ جاري التحميل...')

    try {
      const fileRes = await fetch(url)
      if (!fileRes.ok) throw new Error('فشل الاتصال بالملف')

      const contentLength = fileRes.headers.get('content-length')
      const total = contentLength ? parseInt(contentLength) : 0
      const reader = fileRes.body.getReader()
      const chunks = []
      let received = 0

      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        chunks.push(value)
        received += value.length

        if (progSize) progSize.textContent = fmtBytes(received)
        if (total > 0) {
          const pct = Math.min(Math.round((received / total) * 100), 100)
          if (progBar) progBar.style.width = pct + '%'
          if (progPct) progPct.textContent = pct + '%'
        } else {
          // لو ما عندناش الـ content-length — نحرك الـ bar بشكل animated
          if (progBar) { progBar.style.transition = 'none'; progBar.style.width = '65%' }
          if (progPct) progPct.textContent = '...'
        }
      }

      // ✅ اكتمل التحميل
      if (progBar) { progBar.style.width = '100%'; progBar.classList.add('done') }
      if (progPct) progPct.textContent = '100%'
      if (progSize) progSize.textContent = fmtBytes(received) + ' ✅'

      const blob = new Blob(chunks)
      const blobUrl = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = blobUrl
      a.download = `tiktok-yoru-${ckey}.mp4`
      document.body.appendChild(a)
      a.click()
      document.body.removeChild(a)
      setTimeout(() => URL.revokeObjectURL(blobUrl), 5000)

      showToast(`✅ تم التحميل! (${fmtBytes(received)})`)
      btn.innerHTML = '✅ تم'

    } catch (e) {
      showToast('❌ ' + e.message, true)
      if (progWrap) progWrap.classList.remove('active')
      btn.innerHTML = orig
    } finally {
      setTimeout(() => { btn.disabled = false; if (btn.innerHTML === '✅ تم') btn.innerHTML = orig }, 3000)
    }
  }

  document.getElementById('searchBtn').onclick = search
  document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') search() })
</script>
</body>
</html>
